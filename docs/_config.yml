# Configuration Jekyll pour GitHub Pages

# Informations du site
title: "Documentation Hydrologie-Météorologie"
name: "Documentation - Outil de Récupération et Visualisation de Données Hydrologiques"
description: "Documentation complète pour l'outil de récupération, analyse et visualisation de données hydrologiques et météorologiques"

# URL pour GitHub Pages (à adapter selon votre dépôt)
url: "https://Thomas-MESLIN.github.io"
baseurl: "/RecupeEthiage"

# Paramètres du site
title: "Documentation Hydrologie-Météorologie"
repository: "Thomas-MESLIN/RecupeEthiage"

remote_theme: just-the-docs/just-the-docs
theme: null  # Désactive le thème local


just_the_docs:
  # Configuration de la navigation
  navigation:
    - title: Accueil
      url: /
    - title: Pour commencer
      url: /getting-started
    - title: Utilisation
      children:
        - title: Introduction
          url: /usage/
        - title: Modules
          url: /usage/modules/
    - title: Concepts
      url: /concepts/
    - title: Données
      url: /data/
    - title: Référence API
      url: /api/reference
    # Fil d'Ariane (breadcrumbs)
  breadcrumbs:
    enabled: true
    separator: "/"
  # Logo et favicon
  logo: "/assets/images/logo.png"
  favicon_ico: "/assets/images/favicon.ico"
  
  # Pied de page
  footer_content: "Copyright &copy; 2026 Thomas Meslin. Distribué sous licence MIT."

  # Lien vers le dépôt GitHub
  github_username: Thomas-MESLIN
  repository: Thomas-MESLIN/RecupeEthiage

  # Paramètres d'affichage
  color_scheme: light
  search_enabled: true

# Paramètres Markdown (compatible avec Just the Docs)
markdown: kramdown
kramdown:
  input: GFM
  hard_wrap: false
  syntax_highlighter: rouge
  syntax_highlighter_opts:
    block:
      line_numbers: true
      start_line: 1

# Plugins
plugins:
  - jekyll-feed
  - jekyll-sitemap
  - jekyll-seo-tag

# Paramètres SEO
seo:
  name: "Documentation Hydrologie-Météorologie"
  description: "Documentation complète pour l'outil de récupération, analyse et visualisation de données hydrologiques et météorologiques en France"
  url: "https://Thomas-MESLIN.github.io/RecupeEthiage"

# Exclusions
exclude:
  - Gemfile
  - Gemfile.lock
  - node_modules
  - vendor/bundle/
  - vendor/cache/
  - vendor/gems/
  - vendor/ruby/

# Paramètres de langages
lang: fr_FR
